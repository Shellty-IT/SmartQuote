name: Frontend CI

on:
  push:
    branches: [main]
    paths:
      - 'smartquote-frontend/**'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'smartquote-frontend/**'
      - '.github/workflows/frontend-ci.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: smartquote-frontend

jobs:
  lint-and-typecheck:
    name: Lint + TypeScript
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: smartquote-frontend/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    timeout-minutes: 15

    env:
      NEXT_PUBLIC_BACKEND_URL: ${{ secrets.NEXT_PUBLIC_BACKEND_URL }}
      NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
      NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: smartquote-frontend/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: build
    # Runs on every PR to main (pre-deploy: tests the Vercel preview before merge)
    # and on every push to main (post-deploy: confirms production is healthy).
    timeout-minutes: 60

    env:
      NEXT_PUBLIC_BACKEND_URL: ${{ secrets.NEXT_PUBLIC_BACKEND_URL }}
      TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
      TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: smartquote-frontend/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Clean previous Playwright artifacts
        run: rm -rf playwright-report test-results

      # ── PR: wait for Vercel preview deployment, then test against it ───────────
      # Vercel's GitHub integration creates a deployment for every PR automatically.
      # This action polls GitHub's Deployments API using only GITHUB_TOKEN
      # (no Vercel API key needed) and outputs the preview URL once it is live.
      - name: Wait for Vercel preview deployment
        if: github.event_name == 'pull_request'
        id: vercel-preview
        uses: patrickedqvist/wait-for-vercel-preview@v1.3.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          max_timeout: 300
          check_interval: 15

      # ── push to main: poll production URL ─────────────────────────────────────
      - name: Wait for Vercel production deployment
        if: github.event_name == 'push'
        run: |
          echo "Waiting for Vercel production deployment..."
          echo "Target: ${{ secrets.PLAYWRIGHT_BASE_URL }}"
          sleep 60

          for i in {1..30}; do
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              --max-time 15 --retry 0 \
              -H "Accept: text/html" \
              "${{ secrets.PLAYWRIGHT_BASE_URL }}" || echo "000")

            if [ "$HTTP_STATUS" = "200" ] || [ "$HTTP_STATUS" = "307" ] || [ "$HTTP_STATUS" = "302" ]; then
              echo "Frontend is responding (HTTP $HTTP_STATUS)"
              exit 0
            fi

            echo "   Attempt $i/30: HTTP $HTTP_STATUS — retrying in 10s..."
            sleep 10
          done

          echo "Frontend did not respond after ~5 minutes."
          exit 1

      - name: Run E2E tests
        run: npm run test:e2e:ci
        env:
          # PR → Vercel preview URL; push to main → production URL
          PLAYWRIGHT_BASE_URL: ${{ github.event_name == 'pull_request' && steps.vercel-preview.outputs.url || secrets.PLAYWRIGHT_BASE_URL }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-report
          path: smartquote-frontend/playwright-report/
          retention-days: 14
