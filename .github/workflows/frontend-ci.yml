name: Frontend CI

on:
  push:
    branches: [main]
    paths:
      - 'smartquote-frontend/**'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'smartquote-frontend/**'
      - '.github/workflows/frontend-ci.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    working-directory: smartquote-frontend

jobs:
  lint-and-typecheck:
    name: Lint + TypeScript
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: smartquote-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test:unit

  security-audit:
    name: Production Dependency Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: smartquote-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run security audit
        run: npm audit --omit=dev --audit-level=moderate

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    timeout-minutes: 15

    env:
      NEXT_PUBLIC_BACKEND_URL: ${{ secrets.NEXT_PUBLIC_BACKEND_URL }}
      BACKEND_URL: ${{ secrets.NEXT_PUBLIC_BACKEND_URL }}
      NEXT_PUBLIC_FRONTEND_URL: ${{ secrets.NEXTAUTH_URL }}
      NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
      NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: smartquote-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: build
    # Runs on every PR to main (pre-deploy: tests the Vercel preview before merge)
    # and on every push to main (post-deploy: confirms production is healthy).
    timeout-minutes: 60

    permissions:
      contents: read
      deployments: read

    env:
      NEXT_PUBLIC_BACKEND_URL: ${{ secrets.NEXT_PUBLIC_BACKEND_URL }}
      TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
      TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
      VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: smartquote-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Clean previous Playwright artifacts
        run: rm -rf playwright-report test-results

      # ── PR: resolve + wait for Vercel preview deployment ────────────────────────
      # Vercel's GitHub integration creates a deployment for every PR automatically.
      # We resolve its URL via GitHub's Deployments API (GITHUB_TOKEN only, no
      # Vercel API key needed) and poll it ourselves — rather than a third-party
      # action — so we can attach the Vercel Deployment Protection bypass header.
      # Preview deployments stay behind Vercel Authentication for everyone else;
      # this header is the documented way to let only this CI job through.
      - name: Resolve Vercel preview URL
        if: github.event_name == 'pull_request'
        id: vercel-preview
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          for i in {1..20}; do
            DEPLOYMENT_ID=$(gh api "repos/${{ github.repository }}/deployments?sha=$SHA&per_page=10" \
              --jq '[.[] | select(.environment | test("Preview"; "i"))][0].id' 2>/dev/null || echo "")

            if [ -n "$DEPLOYMENT_ID" ] && [ "$DEPLOYMENT_ID" != "null" ]; then
              URL=$(gh api "repos/${{ github.repository }}/deployments/$DEPLOYMENT_ID/statuses" \
                --jq '[.[] | select(.state=="success") | .environment_url][0]' 2>/dev/null || echo "")

              if [ -n "$URL" ] && [ "$URL" != "null" ]; then
                echo "Found preview URL: $URL"
                echo "url=$URL" >> "$GITHUB_OUTPUT"
                exit 0
              fi
            fi

            echo "Attempt $i/20: Vercel deployment not ready yet, retrying in 15s..."
            sleep 15
          done

          echo "Could not resolve the Vercel preview deployment URL after 5 minutes."
          exit 1

      - name: Wait for Vercel preview deployment to respond
        if: github.event_name == 'pull_request'
        env:
          URL: ${{ steps.vercel-preview.outputs.url }}
        run: |
          echo "Target: $URL"

          for i in {1..20}; do
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              --max-time 15 --retry 0 \
              -H "x-vercel-protection-bypass: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}" \
              -H "x-vercel-set-bypass-cookie: true" \
              "$URL" || echo "000")

            if [ "$HTTP_STATUS" = "200" ] || [ "$HTTP_STATUS" = "307" ] || [ "$HTTP_STATUS" = "302" ]; then
              echo "Preview is responding (HTTP $HTTP_STATUS)"
              exit 0
            fi

            echo "Attempt $i/20: HTTP $HTTP_STATUS — retrying in 15s..."
            sleep 15
          done

          echo "Preview did not respond after ~5 minutes."
          exit 1

      # ── push to main: poll production URL ─────────────────────────────────────
      - name: Wait for Vercel production deployment
        if: github.event_name == 'push'
        run: |
          echo "Waiting for Vercel production deployment..."
          echo "Target: ${{ secrets.PLAYWRIGHT_BASE_URL }}"
          sleep 60

          for i in {1..30}; do
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              --max-time 15 --retry 0 \
              -H "Accept: text/html" \
              "${{ secrets.PLAYWRIGHT_BASE_URL }}" || echo "000")

            if [ "$HTTP_STATUS" = "200" ] || [ "$HTTP_STATUS" = "307" ] || [ "$HTTP_STATUS" = "302" ]; then
              echo "Frontend is responding (HTTP $HTTP_STATUS)"
              exit 0
            fi

            echo "   Attempt $i/30: HTTP $HTTP_STATUS — retrying in 10s..."
            sleep 10
          done

          echo "Frontend did not respond after ~5 minutes."
          exit 1

      - name: Run E2E tests
        run: npm run test:e2e:ci
        env:
          # PR → Vercel preview URL; push to main → production URL
          PLAYWRIGHT_BASE_URL: ${{ github.event_name == 'pull_request' && steps.vercel-preview.outputs.url || secrets.PLAYWRIGHT_BASE_URL }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-report
          path: smartquote-frontend/playwright-report/
          retention-days: 14
