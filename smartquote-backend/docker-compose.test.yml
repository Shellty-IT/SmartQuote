# Ephemeral Postgres for `npm run test:integration` only. Never used by dev/prod —
# those point at the real Neon database configured in .env. tmpfs storage means the
# container's data never touches disk and is gone on `docker compose down`.
services:
  postgres-test:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: smartquote_test
    ports:
      - '5433:5432'
    tmpfs:
      - /var/lib/postgresql/data
