# SmartQuote_backend/.github/workflows/ci.yml
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: TypeScript check
        run: npx tsc --noEmit

  test:
    name: Unit Tests + Coverage
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    timeout-minutes: 15

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GEMINI_MODEL: gemini-2.5-flash
      NODE_ENV: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run tests with coverage
        run: npm test -- --coverage --coverageThreshold='{"global":{"lines":30,"statements":30,"functions":30,"branches":30}}'

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          retention-days: 14

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run security audit
        run: npm audit --audit-level=high

  smoke-test:
    name: Smoke Test (Production)
    runs-on: ubuntu-latest
    needs: [test, security-audit]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    timeout-minutes: 15

    steps:
      - name: Wait for Render deployment
        run: |
          echo "⏳ Waiting for Render deployment to complete..."
          sleep 120

          echo "🔍 Checking backend health endpoint..."
          BACKEND_URL="https://smartquote-backend-fzh5.onrender.com"
          
          for i in {1..30}; do
            RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" "$BACKEND_URL/health" || echo "000")
          
            if [ "$RESPONSE" = "200" ]; then
              echo "✅ Backend health check passed (HTTP $RESPONSE)"
          
              # Dodatkowa weryfikacja JSON response
              HEALTH_JSON=$(curl -s "$BACKEND_URL/health")
              echo "Response body: $HEALTH_JSON"
          
              if echo "$HEALTH_JSON" | grep -q "ok"; then
                echo "✅ Health endpoint returns valid JSON"
                exit 0
              else
                echo "⚠️  Health endpoint returned 200 but invalid JSON"
              fi
            fi
          
            echo "   Attempt $i/30: HTTP $RESPONSE, retrying in 10s..."
            sleep 10
          done

          echo "❌ Backend health check failed after 7 minutes"
          exit 1